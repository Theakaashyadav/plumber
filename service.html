<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Details</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<style>

/* ROOT COLORS (Luxury Theme) */
:root {
  --primary: #D4AF37;
  --secondary: #C5A46D;
  --accent: #8C7853;

  --dark: #0A0A0A;
  --dark-soft: #121212;
  --dark-elevated: #1E1E1E;

  --text: #EDEDED;
  --text-soft: #AFAFAF;
}

/* BODY */
body {
  margin: 0;
  font-family: 'Poppins', Arial, sans-serif;
  background: var(--dark);
  color: var(--text);
}

/* HERO */
.hero {
  
  color: white;
  text-align: center;
  padding: 100px 20px;
  position: relative;
  overflow: hidden;
}

/* subtle glow */
.hero::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  
  top: -100px;
  right: -100px;
  filter: blur(60px);
}

.hero h1 {
  color: var(--primary);
  font-size: 48px;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.hero p {
  color: var(--text-soft);
  font-size: 16px;
}

/* 🔥 SERVICE TABS */
.service-tabs {
  display: flex;
  justify-content: center;
  gap: 15px;
  padding: 25px 20px;
  background: var(--dark-soft);
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.service-tabs button {
  padding: 10px 22px;
  border: 1px solid var(--primary);
  background: transparent;
  color: var(--primary);
  cursor: pointer;
  border-radius: 30px;
  transition: all 0.3s ease;
  font-weight: 600;
}

.service-tabs button:hover {
  background: var(--primary);
  color: black;
  box-shadow: 0 0 12px rgba(212,175,55,0.4);
}

.service-tabs button.active {
  background: var(--primary);
  color: black;
  box-shadow: 0 0 15px rgba(212,175,55,0.5);
}

/* SECTION */
.section {
  display: flex;
  align-items: center;
  gap: 60px;
  max-width: 1200px;
  margin: auto;
  padding: 80px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.section:nth-child(even) {
  flex-direction: row-reverse;
}

/* IMAGE STYLE */
.section img {
  width: 50%;
  border-radius: 14px;
  transition: 0.4s ease;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

.section img:hover {
  transform: scale(1.03);
}

/* TEXT */
.text {
  width: 50%;
}

.text h2 {
  color: var(--primary);
  margin-bottom: 15px;
  font-size: 28px;
}

.text p {
  color: var(--text-soft);
  line-height: 1.8;
  font-size: 15px;
}

/* CTA */
.cta {
  text-align: center;
  padding: 80px 20px;
  background: linear-gradient(135deg, #111, #1a1a1a);
}

.cta a {
  background: var(--primary);
  color: black;
  padding: 14px 34px;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
  transition: 0.3s;
}

.cta a:hover {
  box-shadow: 0 0 20px rgba(212,175,55,0.6);
  transform: translateY(-2px);
}

/* MOBILE */
@media (max-width: 768px) {
  .section {
    flex-direction: column !important;
    text-align: center;
  }

  .section img,
  .text {
    width: 100%;
  }

  .hero h1 {
    font-size: 30px;
  }
}

</style>
</head>

<body>

<div id="header"></div>

<!-- SERVICE BUTTONS -->
<div class="service-tabs">
  <button onclick="loadService('civil')" id="btn-civil">Civil</button>
  <button onclick="loadService('interior')" id="btn-interior">Interior</button>
  <button onclick="loadService('renovation')" id="btn-renovation">Renovation</button>
</div>
<!-- HERO -->
<div class="hero">
  <h1 id="title"></h1>
  <p id="description"></p>
</div>



<!-- CONTENT -->
<div id="content"></div>

<div id="contact-container"></div>

<div id="footer"></div>

<script>

      img: "images/modern.webp"

  ]

};

/* 🔥 MAIN FUNCTION */
function loadService(type) {
  const service = data[type];
  if (!service) return;

  document.getElementById("title").innerText = service.title;
  document.getElementById("description").innerText = service.description;

  const container = document.getElementById("content");
  container.innerHTML = "";

  service.sections.forEach(section => {
    container.innerHTML += `
      <div class="section">
        <img src="${section.img}" alt="">
        <div class="text">
          <h2>${section.title}</h2>
          <p>${section.text}</p>
        </div>
      </div>
    `;
  });

  // active button
  document.querySelectorAll(".service-tabs button").forEach(btn => {
    btn.classList.remove("active");
  });
  document.getElementById("btn-" + type).classList.add("active");
}

/* DEFAULT LOAD */
loadService("civil");

window.addEventListener("DOMContentLoaded", () => {

  Promise.all([
    fetch("header.html").then(res => res.text()),
    fetch("footer.html").then(res => res.text()),
    fetch("contact.html").then(res => res.text())   // ✅ ADDED
  ])
    .then(([header, footer, contact]) => {

      // Insert Header & Footer
      document.getElementById("header").innerHTML = header;
      document.getElementById("footer").innerHTML = footer;

      // ✅ Insert Contact Section
      const contactContainer = document.getElementById("contact-container");
      if (contactContainer) {
        contactContainer.innerHTML = contact;
      }

      // ✅ Attach menu button AFTER header loads
      const menuBtn = document.querySelector(".menu-btn");
      const navLinks = document.querySelector(".nav-links");

      if (menuBtn && navLinks) {
        menuBtn.addEventListener("click", () => {
          navLinks.classList.toggle("show");
        });
      }

    })
    .catch(error => console.error("Error loading components:", error));

});
</script>

</body>
</html>
